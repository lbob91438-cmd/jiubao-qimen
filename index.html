<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九寶奇门专用排盘工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #000;
            color: #d4af37;
            overflow-x: hidden;
        }
        .black-gold-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) saturate(5) hue-rotate(10deg);
            cursor: pointer;
        }
        .yin-gan-label {
            position: absolute;
            width: 1.75rem;
            height: 1.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: #f1c40f;
            font-weight: 900;
            font-size: 0.875rem;
            z-index: 30;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }
        /* 响应式调整 */
        @media (max-width: 640px) {
            .palace-box { padding: 0.5rem !important; }
            .pillar-box { padding: 0.5rem !important; min-width: 60px; }
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <header class="w-full max-w-4xl flex flex-col items-center mb-10 border-b border-[#d4af37]/30 pb-8 text-center">
        <div class="flex items-center gap-4 mb-2">
            <div class="w-14 h-14 border-2 border-[#d4af37] rounded-full flex items-center justify-center font-bold text-2xl shadow-[0_0_20px_rgba(212,175,55,0.4)]">
                九寶
            </div>
            <h1 class="text-4xl md:text-5xl font-black tracking-widest text-[#d4af37]">九寶奇门</h1>
        </div>
        <p class="text-sm tracking-[0.5em] uppercase opacity-80 mb-4 font-bold">传承绝学 造福人类</p>
        <div class="text-xs opacity-50 space-x-4">
            <a href="http://www.jiubaoqimen.com" class="hover:underline">www.jiubaoqimen.com</a>
        </div>
    </header>

    <div class="w-full max-w-4xl black-gold-card p-6 rounded-xl mb-10 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="flex flex-col gap-2">
            <label class="text-[10px] uppercase opacity-60 font-bold tracking-widest">公历日期</label>
            <input type="date" id="inputDate" class="bg-black border border-[#d4af37]/40 p-2 rounded text-[#d4af37] focus:outline-none">
        </div>
        <div class="flex flex-col gap-2">
            <label class="text-[10px] uppercase opacity-60 font-bold tracking-widest">起局时间</label>
            <input type="time" id="inputTime" class="bg-black border border-[#d4af37]/40 p-2 rounded text-[#d4af37] focus:outline-none">
        </div>
        <div class="flex items-end gap-2">
            <button onclick="calculateChart()" class="flex-1 bg-[#d4af37] text-black font-black py-2 rounded hover:bg-[#f1c40f] transition-all uppercase tracking-widest">
                立即起局
            </button>
            <button onclick="exportPDF()" class="p-2 border border-[#d4af37] rounded hover:bg-[#d4af37]/10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>
    </div>

    <div id="chartContent" class="w-full max-w-4xl bg-black border-2 border-[#d4af37] p-6 md:p-12 rounded shadow-2xl relative hidden overflow-visible">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-[0.02] text-[12rem] font-black pointer-events-none select-none tracking-[0.5em] z-0">九寶</div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 border-b-2 border-[#d4af37]/30 pb-6 text-center relative z-10">
            <div class="space-y-1">
                <div class="text-[10px] opacity-50 uppercase font-bold">阳历起局</div>
                <div id="resSolar" class="text-sm font-bold text-white"></div>
            </div>
            <div class="space-y-1">
                <div class="text-[10px] opacity-50 uppercase font-bold">农历日期</div>
                <div id="resLunar" class="text-sm font-bold text-white"></div>
            </div>
            <div class="space-y-1">
                <div class="text-[10px] opacity-50 uppercase font-bold">遁甲局数</div>
                <div id="resJu" class="text-lg font-black text-[#d4af37]"></div>
            </div>
            <div class="space-y-1">
                <div class="text-[10px] opacity-50 uppercase font-bold">旬首·值符·值使</div>
                <div id="resKey" class="text-sm font-bold text-white"></div>
            </div>
        </div>

        <div class="flex justify-center gap-4 md:gap-16 mb-16 relative z-10" id="pillarContainer">
            </div>

        <div class="relative w-full max-w-[600px] mx-auto pt-10 pb-10">
            <div id="palaceGrid" class="grid grid-cols-3 aspect-square w-full border-4 border-[#d4af37] bg-black shadow-2xl relative z-10">
                </div>
        </div>

        <div class="mt-12 pt-6 border-t border-[#d4af37]/30 flex justify-between items-center text-[10px] opacity-50 px-4">
            <div>术数仅供学术研究参考 · 九寶奇门 v3.8</div>
            <div class="font-bold tracking-widest">传承绝学 造福人类</div>
        </div>
    </div>

    <footer class="mt-20 py-10 text-[10px] opacity-30 text-center tracking-[0.3em]">
        九寶奇门专用排盘工具 © 2024 | www.jiubaoqimen.com
    </footer>

    <script>
        // 初始化默认日期时间
        window.onload = () => {
            const now = new Date();
            document.getElementById('inputDate').value = now.toISOString().split('T')[0];
            document.getElementById('inputTime').value = now.toTimeString().split(' ')[0].substring(0, 5);
        };

        const GAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const ZHI = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const ZHI_INDEX = { "子": 1, "丑": 2, "寅": 3, "卯": 4, "辰": 5, "巳": 6, "午": 7, "未": 8, "申": 9, "酉": 10, "戌": 11, "亥": 12 };
        const STARS = { 1: "天蓬", 2: "天芮", 3: "天冲", 4: "天辅", 5: "天禽", 6: "天心", 7: "天柱", 8: "天任", 9: "天英" };
        const DOORS = { 1: "休门", 2: "死门", 3: "伤门", 4: "杜门", 6: "开门", 7: "惊门", 8: "生门", 9: "景门" };
        const GODS = ["值符", "腾蛇", "太阴", "六合", "白虎", "玄武", "九地", "九天"];
        const QI_YI = ["戊", "己", "庚", "辛", "壬", "癸", "丁", "丙", "乙"];
        const MAGIC_SQUARE_LAYOUT = [4, 9, 2, 3, 5, 7, 8, 1, 6]; // 九宫格渲染顺序

        function calculateChart() {
            const dateStr = document.getElementById('inputDate').value;
            const timeStr = document.getElementById('inputTime').value;
            if(!dateStr || !timeStr) return;

            const [y, m, d] = dateStr.split('-').map(Number);
            const [hh, mm] = timeStr.split(':').map(Number);
            const solar = Solar.fromYmdHms(y, m, d, hh, mm, 0);
            const lunar = solar.getLunar();
            const eightChar = lunar.getEightChar();

            // 1. 四柱
            const pillars = [
                {g: eightChar.getYearGan(), z: eightChar.getYearZhi(), label: '年'},
                {g: eightChar.getMonthGan(), z: eightChar.getMonthZhi(), label: '月'},
                {g: eightChar.getDayGan(), z: eightChar.getDayZhi(), label: '日'},
                {g: eightChar.getTimeGan(), z: eightChar.getTimeZhi(), label: '时'}
            ];

            // 2. 定局
            const juNum = (ZHI_INDEX[pillars[0].z] + lunar.getMonth() + lunar.getDay() + ZHI_INDEX[pillars[3].z]) % 9 || 9;
            const isYang = (solar.getMonth() === 12 && solar.getDay() >= 22) || solar.getMonth() < 6 || (solar.getMonth() === 6 && solar.getDay() < 21);
            
            // 3. 地盘
            const diPan = Array(10).fill("");
            QI_YI.forEach((yi, i) => {
                let pos = isYang ? (juNum + i - 1) % 9 + 1 : (juNum - i - 1 + 18) % 9 + 1;
                if (pos === 0) pos = 9;
                diPan[pos] = yi;
            });

            // 4. 旬首
            const hourGanIdx = GAN.indexOf(pillars[3].g);
            const hourZhiIdx = ZHI.indexOf(pillars[3].z);
            const headZhiIdx = (hourZhiIdx - hourGanIdx + 12) % 12;
            const currentXunHead = "甲" + ZHI[headZhiIdx];
            const xunMap = { "甲子": "戊", "甲戌": "己", "甲申": "庚", "甲午": "辛", "甲辰": "壬", "甲寅": "癸" };
            const xunShouYi = xunMap[currentXunHead];

            // 5. 值符值使
            let xunShouPos = diPan.indexOf(xunShouYi);
            if(xunShouPos === 5) xunShouPos = 2;
            const zhiFuStar = STARS[xunShouPos];
            const zhiShiDoor = DOORS[xunShouPos];

            // 6. 天盘
            const searchGan = pillars[3].g === "甲" ? xunShouYi : pillars[3].g;
            let targetPos = diPan.indexOf(searchGan);
            if (targetPos === 5) targetPos = 2;
            const tianPan = Array(10).fill("");
            const jiuXing = Array(10).fill("");
            const rotatePath = [1, 8, 3, 4, 9, 2, 7, 6];
            let offset = rotatePath.indexOf(targetPos) - rotatePath.indexOf(xunShouPos);
            rotatePath.forEach((p, i) => {
                let dest = rotatePath[(i + offset + 16) % 8];
                tianPan[dest] = diPan[p];
                jiuXing[dest] = STARS[p];
            });

            // 7. 八神
            const baShen = Array(10).fill("");
            let godOffset = rotatePath.indexOf(targetPos);
            GODS.forEach((god, i) => {
                let pos = isYang ? rotatePath[(godOffset + i) % 8] : rotatePath[(godOffset - i + 16) % 8];
                baShen[pos] = god;
            });

            // 8. 八门 (跳涧 + 转盘)
            const steps = (ZHI.indexOf(pillars[3].z) - ZHI.indexOf(currentXunHead[1]) + 12) % 12;
            let doorJumpPos = isYang ? (xunShouPos + steps - 1) % 9 + 1 : (xunShouPos - steps - 1 + 18) % 9 + 1;
            if (doorJumpPos === 0) doorJumpPos = 9;
            let rotStart = doorJumpPos === 5 ? 2 : doorJumpPos;
            const baMen = Array(10).fill("");
            const doorSeq = ["休门", "生门", "伤门", "杜门", "景门", "死门", "惊门", "开门"];
            let rotIdx = rotatePath.indexOf(rotStart);
            let origDoorIdx = doorSeq.indexOf(zhiShiDoor);
            rotatePath.forEach((p, i) => {
                const doorIndex = (origDoorIdx + (i - rotIdx + 8) % 8) % 8;
                baMen[rotatePath[i]] = doorSeq[doorIndex];
            });

            // 9. 隐干
            const yinGanMap = Array(10).fill("");
            const hgIdxDi = rotatePath.map(p => diPan[p]).indexOf(searchGan);
            rotatePath.forEach((p, i) => {
                const sIdx = (i - rotatePath.indexOf(rotStart) + hgIdxDi + 16) % 8;
                yinGanMap[p] = rotatePath.map(px => diPan[px])[sIdx];
            });

            // 10. 马星空亡
            const maPos = { "亥":4, "卯":4, "未":4, "申":8, "子":8, "辰":8, "寅":2, "午":2, "戌":2, "巳":6, "酉":6, "丑":6 }[pillars[3].z];
            const kwMap = { "甲子": [6, 7], "甲戌": [2, 7], "甲申": [8, 9], "甲午": [4, 6], "甲辰": [3, 8], "甲寅": [1, 8] };

            renderUI({
                solar: `${dateStr} ${timeStr}`,
                lunar: `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`,
                ju: `${isYang?'阳':'阴'}${juNum}局`,
                key: `${currentXunHead}${xunShouYi} | ${zhiFuStar} | ${zhiShiDoor}`,
                pillars,
                diPan, tianPan, jiuXing, baMen, baShen, yinGan: yinGanMap,
                maPos, kw: kwMap[currentXunHead] || [],
                mid: diPan[5]
            });
        }

        function renderUI(data) {
            document.getElementById('chartContent').classList.remove('hidden');
            document.getElementById('resSolar').innerText = data.solar;
            document.getElementById('resLunar').innerText = data.lunar;
            document.getElementById('resJu').innerText = data.ju;
            document.getElementById('resKey').innerText = data.key;

            // 渲染四柱
            const pCont = document.getElementById('pillarContainer');
            pCont.innerHTML = data.pillars.map(p => `
                <div class="pillar-box flex flex-col items-center border border-[#d4af37]/30 px-6 py-4 bg-gradient-to-b from-[#111] to-[#000] rounded-md shadow-lg">
                    <span class="text-[10px] opacity-40 mb-2">${p.label}柱</span>
                    <span class="text-4xl font-bold text-[#d4af37]">${p.g}</span>
                    <span class="text-4xl font-bold text-white">${p.z}</span>
                </div>
            `).join('');

            // 渲染九宫
            const grid = document.getElementById('palaceGrid');
            grid.innerHTML = MAGIC_SQUARE_LAYOUT.map(pNum => {
                const isMa = data.maPos === pNum;
                const isKW = data.kw.includes(pNum);
                const isRui = data.jiuXing[pNum] === "天芮";
                const dDiPan = pNum === 2 ? data.diPan[2] + data.mid : data.diPan[pNum];
                const dTianPan = isRui ? data.tianPan[pNum] + data.mid : data.tianPan[pNum];

                // 隐干位置
                const yinStyleMap = { 4: "-top-10 -left-10", 9: "-top-10 left-1/2 -translate-x-1/2", 2: "-top-10 -right-10", 3: "top-1/2 -left-10 -translate-y-1/2", 7: "top-1/2 -right-10 -translate-y-1/2", 8: "-bottom-10 -left-10", 1: "-bottom-10 left-1/2 -translate-x-1/2", 6: "-bottom-10 -right-10" };
                const kwStyleMap = { 4: "-top-3 -left-3", 9: "-top-3 left-1/2 -translate-x-1/2", 2: "-top-3 -right-3", 3: "top-1/2 -left-3 -translate-y-1/2", 7: "top-1/2 -right-3 -translate-y-1/2", 8: "-bottom-3 -left-3", 1: "-bottom-3 left-1/2 -translate-x-1/2", 6: "-bottom-3 -right-3" };
                const maStyleMap = { 4: "-top-1.5 -left-1.5", 2: "-top-1.5 -right-1.5", 8: "-bottom-1.5 -left-1.5", 6: "-bottom-1.5 -right-1.5" };

                return `
                    <div class="relative border border-[#d4af37]/30 p-3 md:p-5 flex flex-col justify-between hover:bg-[#d4af37]/5 transition-all group ${pNum===5?'bg-[#111]':''}">
                        ${isKW ? `<span class="absolute text-[#e74c3c] text-2xl font-bold z-20 ${kwStyleMap[pNum]}">⭕️</span>` : ''}
                        ${isMa ? `<span class="absolute bg-[#e74c3c] text-white text-[10px] px-1.5 py-0.5 rounded font-black z-20 ${maStyleMap[pNum]}">马</span>` : ''}
                        <div class="absolute bottom-1 right-1 text-[9px] opacity-5 font-black">${pNum}</div>
                        ${pNum !== 5 ? `<div class="yin-gan-label ${yinStyleMap[pNum]}">${data.yinGan[pNum]}</div>` : ''}
                        
                        ${pNum !== 5 ? `
                            <div class="flex justify-between items-start">
                                <span class="text-sm md:text-lg font-black text-[#f1c40f]">${data.baShen[pNum]}</span>
                                <span class="text-[10px] md:text-sm font-bold text-white/70">${data.jiuXing[pNum]}</span>
                            </div>
                            <div class="flex flex-col items-center justify-center flex-1 py-1">
                                <span class="text-4xl font-black text-white leading-none">${dTianPan}</span>
                                <span class="text-4xl font-black text-[#d4af37]/30 leading-none mt-1">${dDiPan}</span>
                            </div>
                            <div class="flex justify-end items-end">
                                <span class="text-sm md:text-xl font-bold text-[#d4af37]">${data.baMen[pNum]}</span>
                            </div>
                        ` : `
                            <div class="h-full flex flex-col items-center justify-center opacity-30">
                                <div class="text-4xl font-black text-white">${data.mid}</div>
                                <div class="text-[10px] mt-2">寄坤二宫</div>
                            </div>
                        `}
                    </div>
                `;
            }).join('');
        }

        async function exportPDF() {
            const chart = document.getElementById('chartContent');
            const canvas = await html2canvas(chart, { backgroundColor: '#000', scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const width = pdf.internal.pageSize.getWidth();
            const height = (canvas.height * width) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 10, width, height);
            pdf.save('九寶奇门排盘.pdf');
        }
    </script>
</body>
</html>
